<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Estudio | Eventos con Identidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #000000;
            --gris-oscuro: #111111;
            --gris-detalle: #888888;
            --blanco: #ffffff;
            --divisor: #222222;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--negro);
            color: var(--blanco);
            line-height: 1.6;
        }

        .site-wrapper {
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), 
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 100px 20px 60px;
        }

        .logo-img {
            max-width: 400px;
            width: 85%;
            height: auto;
            margin-bottom: 20px;
        }

        .contenedor {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .titulo-seccion {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 80px 0 30px;
            border-bottom: 1px solid var(--blanco);
            padding-bottom: 10px;
        }

        .producto-fila {
            display: flex;
            align-items: center;
            padding: 35px 0;
            border-bottom: 1px solid var(--divisor);
            gap: 30px;
        }

        .contenedor-galeria {
            position: relative;
            width: 160px;
            height: 160px;
            flex-shrink: 0;
        }

        .prod-img {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            object-fit: cover;
            cursor: zoom-in;
            border: 1px solid var(--divisor);
            background: var(--gris-oscuro);
        }

        .badge-galeria {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #444;
            pointer-events: none;
        }

        .prod-info { flex: 1; }
        .prod-info h3 { margin: 0 0 8px; font-size: 1.2rem; font-weight: 600; }
        .prod-info p { margin: 0; font-size: 0.95rem; color: var(--gris-detalle); font-weight: 300; }

        /* MODAL / LIGHTBOX */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #modal-img {
            max-width: 85%;
            max-height: 75%;
            object-fit: contain;
            border: 1px solid #333;
        }

        .modal-nav {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        .nav-btn {
            background: none;
            border: 1px solid white;
            color: white;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .nav-btn:hover { background: white; color: black; }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            line-height: 1;
        }

        footer {
            text-align: center;
            padding: 100px 20px;
            border-top: 1px solid var(--divisor);
        }

        .btn-contacto {
            display: inline-block;
            margin: 10px;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
