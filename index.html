<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Estudio | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #000000;
            --gris-oscuro: #111111;
            --blanco: #ffffff;
            --divisor: #222222;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--negro);
            color: var(--blanco);
        }

        /* Contenedor principal para que el fondo no tape todo */
        .site-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            padding-bottom: 50px;
        }

        header { text-align: center; padding: 60px 20px; }
        .logo-img { max-width: 300px; width: 80%; height: auto; }

        .contenedor { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        .titulo-seccion {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--divisor);
            padding-bottom: 10px;
            margin: 50px 0 20px;
        }

        .producto-fila {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--divisor);
        }

        .contenedor-galeria {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            position: relative;
            cursor: pointer;
        }

        .prod-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #333;
        }

        .badge-galeria {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .prod-info h3 { margin: 0; font-size: 1.1rem; }
        .prod-info p { margin: 5px 0 0; color: #888; font-size: 0.9rem; }

        /* MODAL CORREGIDO: display none por defecto */
        #modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #modal-img {
            max-width: 90%;
            max-height: 70%;
            border: 2px solid #222;
            object-fit: contain;
        }

        .modal-nav { display: flex; gap: 20px; margin-top: 20px; }
        .nav-btn {
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }

        footer { text-align: center; padding: 60px; }
        .btn-contacto {
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        .wpp { background: #25D366; }
        .ig { background: #E1306C; }
    </style>
</head>
<body>

<div class="site-wrapper">
    <header>
        <img src="logo-blanco.png" alt="Soft Estudio" class="logo-img">
    </header>

    <div class="contenedor">
        <div class="titulo-seccion">Digital</div>
        
        <div class="producto-fila">
            <div class="contenedor-galeria" onclick="abrirGaleria(['invitacion-web-1.jpg', 'invitacion-web-2.jpg'])">
                <img src="invitacion-web-1.jpg" class="prod-img">
                <div class="badge-galeria">+ Ver</div>
            </div>
            <div class="prod-info">
                <h3>Invitaciones Web</h3>
                <p>Interactiva y personalizada.</p>
            </div>
        </div>

        <div class="titulo-seccion">Detalles y Cotillón</div>

        <div class="producto-fila">
            <div class="contenedor-galeria" onclick="abrirGaleria(['removedores%20de%20tragos-1.png', 'removedores%20de%20tragos-2.png'])">
                <img src="removedores%20de%20tragos.png" class="prod-img">
                <div class="badge-galeria">+ Ver</div>
            </div>
            <div class="prod-info">
                <h3>Removedores</h3>
                <p>Acrílico grabado láser.</p>
            </div>
        </div>

        <div class="producto-fila">
            <div class="contenedor-galeria" onclick="abrirGaleria(['gorras-1.jpeg', 'gorras-2.jpeg'])">
                <img src="gorras.jpeg" class="prod-img">
                <div class="badge-galeria">+ Ver</div>
            </div>
            <div class="prod-info">
                <h3>Gorras</h3>
                <p>Premium personalizadas.</p>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://wa.me/3534594320" class="btn-contacto wpp">WhatsApp</a>
        <a href="https://instagram.com/sof.estudiodg" class="btn-contacto ig">Instagram</a>
    </footer>
</div>

<div id="modal-overlay">
    <span class="close-btn" onclick="cerrarImagen()">&times;</span>
    <img id="modal-img" src="">
    <div class="modal-nav" id="nav-container">
        <button class="nav-btn" onclick="cambiarImagen(-1)">Anterior</button>
        <button class="nav-btn" onclick="cambiarImagen(1)">Siguiente</button>
    </div>
</div>

<script>
    let imagenesActuales = [];
    let indiceActual = 0;

    function abrirGaleria(lista) {
        imagenesActuales = lista;
        indiceActual = 0;
        document.getElementById('modal-img').src = imagenesActuales[indiceActual];
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('nav-container').style.display = (lista.length > 1) ? 'flex' : 'none';
    }

    function cambiarImagen(paso) {
        indiceActual += paso;
        if (indiceActual >= imagenesActuales.length) indiceActual = 0;
        if (indiceActual < 0) indiceActual = imagenesActuales.length - 1;
        document.getElementById('modal-img').src = imagenesActuales[indiceActual];
    }

    function cerrarImagen() {
        document.getElementById('modal-overlay').style.display = 'none';
    }
</script>

</body>
</html>
