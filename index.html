<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Estudio | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #000000;
            --gris-oscuro: #111111;
            --gris-detalle: #888888;
            --blanco: #ffffff;
            --divisor: #222222;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--negro);
            color: var(--blanco);
            line-height: 1.6;
        }

        .site-wrapper {
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), 
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        .logo-img {
            max-width: 300px;
            width: 80%;
            height: auto;
        }

        .contenedor {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .titulo-seccion {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 50px 0 20px;
            border-bottom: 1px solid var(--divisor);
            padding-bottom: 10px;
            color: var(--gris-detalle);
        }

        .producto-fila {
            display: flex;
            align-items: center;
            padding: 25px 0;
            border-bottom: 1px solid var(--divisor);
            gap: 20px;
        }

        .contenedor-galeria {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

            width: 100%;
