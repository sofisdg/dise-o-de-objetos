<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Estudio | Catálogo</title>
    <style>
        /* Estilos base para evitar errores de visualización */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Fondo negro sólido para evitar errores de degradado */
            color: #ffffff;
            font-family: sans-serif;
        }

        .contenedor {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header { text-align: center; padding: 40px 0; }
        .logo { max-width: 280px; height: auto; }

        .seccion {
            border-bottom: 1px solid #333;
            margin: 30px 0 15px;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .producto {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }

        .foto-miniatura {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid #444;
        }

        .texto h3 { margin: 0; font-size: 1.1rem; }
        .texto p { margin: 5px 0 0; color: #888; font-size: 0.9rem; }

        /* EL MODAL (PANTALLA DE AMPLIACIÓN) */
        /* Importante: display: none para que NO inicie en negro */
        #visor-galeria {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #imagen-ampliada {
            max-width: 90%;
            max-height: 70%;
            object-fit: contain;
            border: 1px solid #333;
        }

        .controles {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .boton {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .boton-cerrar {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 35px;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <header>
        <img src="logo-blanco.png" alt="Soft Estudio" class="logo">
    </header>

    <div class="seccion">Digital</div>
    
    <div class="producto">
        <img src="invitacion-web-1.jpg" class="foto-miniatura" onclick="abrir(['invitacion-web-1.jpg', 'invitacion-web-2.jpg'])">
        <div class="texto">
            <h3>Invitaciones Web</h3>
            <p>Interactivas con música y confirmación.</p>
        </div>
    </div>

    <div class="seccion">Detalles</div>

    <div class="producto">
        <img src="removedores de tragos.png" class="foto-miniatura" onclick="abrir(['removedores de tragos.png', 'removedores de tragos-1.png', 'removedores de tragos-2.png'])">
        <div class="texto">
            <h3>Removedores</h3>
            <p>Acrílico personalizado para eventos.</p>
        </div>
    </div>

    <div class="producto">
        <img src="gorras.jpeg" class="foto-miniatura" onclick="abrir(['gorras-1.jpeg', 'gorras-2.jpeg'])">
        <div class="texto">
            <h3>Gorras</h3>
            <p>Cotillón premium personalizado.</p>
        </div>
    </div>
</div>

<div id="visor-galeria">
    <button class="boton-cerrar" onclick="cerrar()">&times;</button>
    
    <img id="imagen-ampliada" src="">

    <div class="controles" id="barra-botones">
        <button class="boton" onclick="navegar(-1)">Anterior</button>
        <button class="boton" onclick="navegar(1)">Siguiente</button>
    </div>
</div>

<script>
    let listaFotos = [];
    let indice = 0;

    function abrir(fotos) {
        listaFotos = fotos;
        indice = 0;
        
        // Asignar la primera imagen
        document.getElementById('imagen-ampliada').src = listaFotos[indice];
        
        // Mostrar el modal
        document.getElementById('visor-galeria').style.display = 'flex';
        
        // Si solo hay una foto, esconder botones anterior/siguiente
        document.getElementById('barra-botones').style.display = (fotos.length > 1) ? 'flex' : 'none';
    }

    function navegar(direccion) {
        indice += direccion;
        
        // Efecto carrusel infinito
        if (indice >= listaFotos.length) indice = 0;
        if (indice < 0) indice = listaFotos.length - 1;
        
        document.getElementById('imagen-ampliada').src = listaFotos[indice];
    }

    function cerrar() {
        document.getElementById('visor-galeria').style.display = 'none';
    }
</script>

</body>
</html>
